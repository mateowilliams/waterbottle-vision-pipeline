services:
  db:
    image: postgres:16
    container_name: proyecto2-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: bottles
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d bottles"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: proyecto2-app
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/bottles
      MODEL_ARTIFACT: artifacts/waterbottle_resnet18_v1.pt
      REFERENCE_STATS: artifacts/reference_stats.json
      LOW_CONF_THRESHOLD: "0.60"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persist uploads and allow (re)training inside the container.
      - ./data:/app/data
      # See new artifacts (after retraining) without rebuilding the image.
      - ./artifacts:/app/artifacts

volumes:
  pgdata:
